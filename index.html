<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Box</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    text-align:center;
}

input[type=text]{
    width:300px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:25px;
    outline:none;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:10px 30px;
    border:none;
    border-radius:25px;
    background:#007BFF;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="container">
    <h2>Search</h2>

    <form action="https://usebasin.com/f/f700240ccedc" method="POST">

        <input
            type="text"
            name="Search_Text"
            placeholder="Type something..."
            required>

        <br>

        <button type="submit">Search</button>

    </form>
</div>

</body>
</html>
